apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      type: cicd        # ← ADD THIS
  template:
    metadata:
      labels:
        app: myapp
        type: cicd        # ← ADD THIS
    spec:
      containers:
      - name: myapp
        image: localhost:5000/myapp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
spec:
  type: NodePort
  selector:
    app: myapp
    type: cicd          # ← ADD THIS
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30090
